# =============================================================================
# Pipeline do Backend — Lint → Test → Build → Push
# =============================================================================
name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2 # Versão corrigida para Node 24+

      - name: Set up Python
        uses: actions/setup-python@v5.4.0 # Suporte oficial ao Node 24+
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        working-directory: ./backend
        run: ruff check app/

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -e .
          pip install pytest pytest-asyncio httpx aiosqlite

      - name: Run tests
        working-directory: ./backend
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite+aiosqlite:///test.db
        run: pytest __tests__/ -v

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0 # Versão com suporte atualizado

      - name: Login to DockerHub
        uses: docker/login-action@v3.3.0 # Versão com suporte atualizado
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.15.0 # Versão moderna e compatível
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/condocombat-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/condocombat-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max